services:
  - type: web
    name: finders-dashboard
    runtime: node
    plan: starter
    buildCommand: "npm install"
    startCommand: "npm start"
    envVars:
      - key: DATA_DIR
        value: /opt/render/project/src/data
    disk:
      name: finders-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
